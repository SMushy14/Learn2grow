services:
  frontend:
    build: ./frontend
    image: smushy14/learn2grow-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    image: smushy14/learn2grow-backend:latest
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    depends_on:
      - db

  db:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
