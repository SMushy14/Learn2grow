services:
  frontend:
    image: ${ECR_REGISTRY}/devops-project-dev-frontend:latest
    ports:
      - "80:3000"
    depends_on:
      - backend

  backend:
    image: ${ECR_REGISTRY}/devops-project-dev-backend:latest
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"

volumes:
  mongo-data:
