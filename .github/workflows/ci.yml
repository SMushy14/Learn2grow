# This workflow will do a clean installation of node dependencies, cache/restore them,
# build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: CI workflow

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Lint code
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Build Docker image
        run: docker build -t learn2grow-backend:ci .

      - name: Scan backend image for CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: learn2grow-backend:ci
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

  frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint and fixing code
        run: npm run lint

      - name: Fixing linting issues
        run: npm run lint -- --fix

      - name: Build Docker image
        run: docker build -t frontend-app:latest .

      - name: Scan frontend image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          
          image-ref: frontend-app:latest
          severity: CRITICAL,HIGH
          format: table
          exit-code: 1
          ignore-unfixed: true

  scan-infrastructure:
    name: Scan Terraform Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan Terraform code
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform/ 
          exit_code: 1 



